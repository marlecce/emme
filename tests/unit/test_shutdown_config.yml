server:
  port: 8444
  max_connections: 100
  shutdown_timeout_seconds: 3
  log_level: ERROR

logging:
  file: emme_shutdown_test.log
  level: error
  format: plain
  buffer_size: 16384
  rollover_size: 10485760
  rollover_daily: true
  appender_flags:
    - console

ssl:
  certificate: "certs/dev.crt"
  private_key:  "certs/dev.key"

routes:
  - path: "/static/"
    technology: "static"
    document_root: "temp_shutdown_static"
