server:
  port: 8443
  max_connections: 100
  request_timeout_ms: 30000        # Default 30s request timeout (override via EMME_REQUEST_TIMEOUT env var)
  tls_handshake_timeout_ms: 10000  # Default 10s TLS handshake timeout (override via EMME_TLS_HANDSHAKE_TIMEOUT env var)
  log_level: info

logging:
  file: emme.log
  level: debug
  format: plain         # or "json"
  buffer_size: 16384
  rollover_size: 10485760   # 10 MB
  rollover_daily: true
  appender_flags:
    - file
    - console  

ssl:
  certificate: "certs/dev.crt"
  private_key: "certs/dev.key"
  session_cache_size: 100000
  session_timeout: 300
  session_ticket_key: "/etc/emme/ticket.key"
  read_buffer_size: 32768
  enable_partial_write: 1
  release_buffers: 1

http2:
  keepalive_timeout: 60
  max_requests_per_connection: 1000
  max_concurrent_streams: 100

security_headers:
  enabled: true
  headers:
    - name: "Strict-Transport-Security"
      value: "max-age=31536000; includeSubDomains"
    - name: "X-Content-Type-Options"
      value: "nosniff"
    - name: "X-Frame-Options"
      value: "DENY"
    - name: "X-XSS-Protection"
      value: "1; mode=block"
    - name: "Content-Security-Policy"
      value: "default-src 'self'"
    - name: "Referrer-Policy"
      value: "strict-origin-when-cross-origin"

routes:
    - path: "/static/"
      technology: "static"
      document_root: "/var/www/html"
    - path: "/api/"
      technology: "reverse_proxy"
      backend: "127.0.0.1:8081"
      cors:
        enabled: true
        allow_origin: "*"
        allow_methods: "GET, POST, OPTIONS"
        allow_headers: "Content-Type, Authorization"
        allow_credentials: false
        max_age_seconds: 86400
