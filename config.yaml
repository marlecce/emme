server:
  port: 8443
  max_connections: 100
  log_level: info

logging:
  file: emme.log
  level: debug
  format: plain         # or "json"
  buffer_size: 16384
  rollover_size: 10485760   # 10 MB
  rollover_daily: true
  appender_flags:
    - file
    - console  

ssl:
  certificate: "certs/dev.crt"
  private_key: "certs/dev.key"
  session_cache_size: 100000
  session_timeout: 300
  session_ticket_key: "/etc/emme/ticket.key"
  read_buffer_size: 32768
  enable_partial_write: 1
  release_buffers: 1

http2:
  keepalive_timeout: 60
  max_requests_per_connection: 1000
  max_concurrent_streams: 100

routes:
    - path: "/static/"
      technology: "static"
      document_root: "/var/www/html"
    - path: "/api/"
      technology: "reverse_proxy"
      backend: "127.0.0.1:8081"
